services:
  postgres:
    image: postgres:16-alpine
    container_name: evidentra-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evidentra}
      POSTGRES_USER: ${POSTGRES_USER:-evidentra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evidentra}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evidentra} -d ${POSTGRES_DB:-evidentra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evidentra-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/evidentra}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-evidentra}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-evidentra}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-unique-production-secret-at-least-32-characters}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
